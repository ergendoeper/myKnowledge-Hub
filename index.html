<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebGPU Knowledge Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <header class="bg-slate-900 text-white px-6 py-4 shadow-md flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-teal-500 p-2 rounded-lg text-slate-950 font-bold text-xl">Ω</div>
            <div>
                <div class="flex items-center space-x-2">
                    <h1 class="text-xl font-bold tracking-tight">Local WebGPU Knowledge Hub</h1>
                    <span class="text-[10px] font-mono bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded border border-slate-700">v1.6.0</span>
                </div>
                <p class="text-xs text-slate-400">100% Autark • Pfad-Stabilität erzwungen</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-3">
            <div class="flex flex-col">
                <label class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-0.5">Aktives KI-Modell</label>
                <select id="model-selector" class="bg-slate-800 text-slate-200 border border-slate-700 rounded px-2 py-1 text-xs focus:outline-none focus:border-teal-500">
                    <option value="model-qwen15">Qwen 1.5 (12MB - Ultra-Light)</option>
                    <option value="model-smollm2">SmolLM2 (45MB - Fast RAG)</option>
                </select>
            </div>
            <div id="model-status" class="flex items-center space-x-2 text-sm bg-slate-800 px-3 py-3.5 rounded-md border border-slate-700 h-[38px] mt-4">
                <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse" id="status-dot"></span>
                <span id="status-text" class="text-slate-300 text-xs">Initialisiere App...</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden w-full">
        <div class="w-5/12 border-r border-slate-200 flex flex-col bg-white overflow-y-auto p-4 space-y-6">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <h2 class="text-sm font-semibold text-slate-900 uppercase tracking-wider mb-3">➕ Dokument / Link erfassen</h2>
                <div class="space-y-3">
                    <input type="text" id="link-title" placeholder="Titel (z.B. Jira Ticket)" class="w-full text-sm px-3 py-2 border rounded-md">
                    <input type="text" id="link-url" placeholder="Original-Link (https://...)" class="w-full text-sm px-3 py-2 border rounded-md">
                    <textarea id="link-content" rows="4" placeholder="Text hier hineinkopieren..." class="w-full text-sm px-3 py-2 border rounded-md font-mono text-xs"></textarea>
                    <button id="btn-add" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium text-sm py-2 rounded-md">Speichern</button>
                </div>
            </div>

            <div class="space-y-3 flex-1 flex flex-col min-h-0">
                <input type="text" id="search-input" placeholder="Durchsuchen..." class="w-full text-sm px-3 py-2 border rounded-lg bg-slate-50">
                <div id="links-container" class="space-y-2 flex-1 overflow-y-auto"></div>
            </div>
        </div>

        <div class="w-7/12 flex flex-col bg-slate-900 text-slate-100 overflow-hidden">
            <div class="bg-slate-950 p-3 border-b border-slate-800 text-xs">
                Kontext: <span id="active-context-title" class="text-teal-400 font-bold">Gesamte Wissensdatenbank</span>
            </div>
            <div id="chat-log" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm">
                <div class="bg-slate-800 p-3 rounded-xl max-w-[85%]" id="system-welcome-msg">
                    System bereit (v1.6.0). Bereite Modell-Initialisierung vor...
                </div>
            </div>
            <div class="p-4 bg-slate-950 border-t border-slate-800 flex space-x-2">
                <input type="text" id="chat-input" placeholder="Modell lädt..." class="flex-1 bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-teal-500" disabled>
                <button id="send-btn" class="bg-teal-600 text-slate-950 font-semibold px-4 rounded-lg text-sm" disabled>Senden</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';
        
        env.allowLocalModels = true; 
        env.remoteModels = false;
        env.localModelPath = './'; 

        let links = [];
        let activeContextIndex = null;
        let generatorPipeline = null;

        document.getElementById('btn-add').addEventListener('click', addLink);
        document.getElementById('search-input').addEventListener('input', renderLinks);
        document.getElementById('send-btn').addEventListener('click', sendChatMessage);
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
        
        document.getElementById('model-selector').addEventListener('change', (e) => {
            initLLM(e.target.value);
        });

        loadLinksFromStorage();
        renderLinks();
        initLLM(document.getElementById('model-selector').value);

        async function initLLM(modelFolder) {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');

            chatInput.setAttribute('disabled', 'true');
            sendBtn.setAttribute('disabled', 'true');
            chatInput.placeholder = "Modell wird geladen...";
            statusDot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
            
            const log = document.getElementById('chat-log');
            const noticeDiv = document.createElement('div');
            noticeDiv.className = "bg-slate-950 text-amber-400 p-2 rounded text-xs italic border border-amber-900/40 my-2";
            noticeDiv.innerText = `🔄 Versuche autarken Zugriff auf: ./${modelFolder}/ ...`;
            log.appendChild(noticeDiv);
            log.scrollTop = log.scrollHeight;

            try {
                statusText.innerText = `Prüfe...`;
                
                // VZW: Wir zwingen Transformers.js, die Modelldatei direkt flach aus dem Ordner zu lesen,
                // ohne nach Unterordnern wie 'onnx/' zu suchen.
                generatorPipeline = await pipeline('text-generation', modelFolder, {
                    device: 'wasm',
                    model_file: 'model_quantized.onnx', 
                    progress_callback: (data) => {
                        if (data.status === 'progress') statusText.innerText = `${Math.round(data.progress)}%`;
                    }
                });

                statusDot.className = "w-2 h-2 rounded-full bg-blue-500";
                statusText.innerText = 'Bereit (CPU)';
                
                chatInput.removeAttribute('disabled');
                sendBtn.removeAttribute('disabled');
                chatInput.placeholder = "Frag mich etwas über deine Dokumente...";
                
                const readyDiv = document.createElement('div');
                readyDiv.className = "bg-slate-800 p-3 rounded-xl text-slate-100 border border-slate-700 mt-2";
                readyDiv.innerHTML = `<b>AI:</b> Modell <code>${modelFolder}</code> ist jetzt vollkommen offline einsatzbereit auf deiner CPU!`;
                log.appendChild(readyDiv);
                log.scrollTop = log.scrollHeight;

            } catch (err) {
                console.error(err);
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                statusText.innerText = 'Ladefehler';
                chatInput.placeholder = "Fehler beim Laden.";
                
                const errDiv = document.createElement('div');
                errDiv.className = "bg-slate-950 text-red-400 p-3 rounded text-xs border border-red-900/40 my-2";
                errDiv.innerHTML = `<b>❌ Fehler beim Laden von ./${modelFolder}/</b><br>
                Mögliche Gründe:<br>
                1. GitHub Pages führt im Hintergrund noch den Klon-Prozess aus (Dauer: ca. 1-2 Min).<br>
                2. Der Browser hält noch ein altes Abbild im Cache.<br><br>
                <i>Tipp: Warte kurz und lade die Seite mit <b>Strg + F5</b> oder mit einem Zusatz in der Adresszeile (z.B. <code>?v=6</code>) neu.</i>`;
                log.appendChild(errDiv);
                log.scrollTop = log.scrollHeight;
            }
        }

        function loadLinksFromStorage() {
            const stored = localStorage.getItem('local_knowledge_hub_links');
            if (stored) links = JSON.parse(stored);
        }

        function addLink() {
            const t = document.getElementById('link-title');
            const u = document.getElementById('link-url');
            const c = document.getElementById('link-content');
            if (!t.value || !u.value) return;

            links.unshift({ title: t.value, url: u.value, content: c.value || '' });
            localStorage.setItem('local_knowledge_hub_links', JSON.stringify(links));
            renderLinks();
            t.value = ''; u.value = ''; c.value = '';
        }

        function renderLinks() {
            const container = document.getElementById('links-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';

            const filtered = links.filter(l => l.title.toLowerCase().includes(search) || l.content.toLowerCase().includes(search));
            filtered.forEach((link) => {
                const isSelected = links.indexOf(link) === activeContextIndex;
                const card = document.createElement('div');
                card.className = `p-3 rounded-lg border cursor-pointer ${isSelected ? 'bg-teal-50 border-teal-500 shadow-sm' : 'bg-slate-50 hover:bg-slate-100 border-slate-200'}`;
                card.innerHTML = `<h4 class="text-sm font-bold text-slate-900 truncate">${link.title}</h4><p class="text-xs text-slate-500 truncate">🔗 ${link.url}</p>`;
                card.addEventListener('click', () => {
                    activeContextIndex = links.indexOf(link);
                    document.getElementById('active-context-title').innerText = link.title;
                    renderLinks();
                });
                container.appendChild(card);
            });
        }

        async function sendChatMessage() {
            const inp = document.getElementById('chat-input');
            const log = document.getElementById('chat-log');
            const val = inp.value.trim();
            if (!val || !generatorPipeline) return;

            inp.value = '';
            const uDiv = document.createElement('div');
            uDiv.className = "bg-slate-700 p-3 rounded-xl max-w-[85%] ml-auto text-white text-sm";
            uDiv.innerText = val;
            log.appendChild(uDiv);

            const aDiv = document.createElement('div');
            aDiv.className = "bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-300 italic animate-pulse text-sm max-w-[85%]";
            aDiv.innerText = "Generiere Antwort...";
            log.appendChild(aDiv);
            log.scrollTop = log.scrollHeight;

            let ctx = activeContextIndex !== null ? links[activeContextIndex].content : links.map(l => l.content).join("\n\n");
            if (!ctx.trim()) ctx = "Kein Kontext vorhanden.";

            try {
                const currentModel = document.getElementById('model-selector').value;
                let messages = [];
                
                if (currentModel === 'model-smollm2') {
                    messages = [
                        { role: 'system', content: `Du bist ein präziser IT-Assistent. Beantworte die Frage kurz auf Deutsch basierend auf dem Kontext.\n\nKontext:\n${ctx}` },
                        { role: 'user', content: val }
                    ];
                } else {
                    // Qwen 1.5 Format
                    messages = [
                        { role: 'system', content: `Du bist ein präziser IT-Assistent. Beantworte die Frage kurz auf Deutsch basierend auf dem Kontext.\n\nKontext:\n${ctx}` },
                        { role: 'user', content: val }
                    ];
                }

                const out = await generatorPipeline(messages, {
                    max_new_tokens: 90,
                    temperature: 0.1,
                    repetition_penalty: 1.2
                });
                
                const answer = out[0].generated_text[out[0].generated_text.length - 1].content.trim();
                
                aDiv.className = "bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-100 text-sm max-w-[85%]";
                aDiv.innerText = answer || "Keine Antwort im Kontext gefunden.";
            } catch (err) {
                console.error(err);
                aDiv.innerText = "Inferenz-Fehler.";
            }
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>

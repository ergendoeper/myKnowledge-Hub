<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebGPU Knowledge Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">
    <header class="bg-slate-900 text-white px-6 py-4 shadow-md flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-teal-500 p-2 rounded-lg text-slate-950 font-bold text-xl">Ω</div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Local WebGPU Knowledge Hub</h1>
                <p class="text-xs text-slate-400">v2.0 • PDF-Support + Robust Loading</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <select id="model-selector" class="bg-slate-800 text-slate-200 border border-slate-700 rounded px-3 py-1 text-sm focus:outline-none">
                <option value="model-qwen15">Qwen 1.5 (Ultra-Light)</option>
                <option value="model-smollm2">SmolLM2</option>
            </select>
            <div id="model-status" class="flex items-center space-x-2 bg-slate-800 px-4 py-2 rounded border border-slate-700">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="status-text" class="text-xs text-slate-300">Initialisiere...</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- Linke Spalte -->
        <div class="w-5/12 border-r border-slate-200 bg-white flex flex-col p-4 space-y-4 overflow-y-auto">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <h2 class="text-sm font-semibold uppercase tracking-wider mb-3">📄 Dokument / Link erfassen</h2>
                <div class="space-y-3">
                    <input type="text" id="link-title" placeholder="Titel (z.B. SAFE 5)" class="w-full px-3 py-2 border rounded-md text-sm">
                    <input type="text" id="link-url" placeholder="Original-Link (optional)" class="w-full px-3 py-2 border rounded-md text-sm">
                    <textarea id="link-content" rows="4" placeholder="Text hier oder PDF-Inhalt..." class="w-full px-3 py-2 border rounded-md font-mono text-sm"></textarea>
                    
                    <div class="flex gap-2">
                        <button id="btn-add" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white py-2.5 rounded-md font-medium">Speichern</button>
                        <label class="flex-1 bg-slate-200 hover:bg-slate-300 py-2.5 rounded-md text-center cursor-pointer font-medium">
                            📤 PDF hochladen
                            <input type="file" id="pdf-upload" accept=".pdf" class="hidden">
                        </label>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <input type="text" id="search-input" placeholder="Suchen..." class="w-full px-3 py-2 border rounded-lg bg-slate-50 mb-3">
                <div id="links-container" class="space-y-2 flex-1 overflow-y-auto"></div>
            </div>
        </div>

        <!-- Chat -->
        <div class="w-7/12 flex flex-col bg-slate-900 text-slate-100 overflow-hidden">
            <div class="bg-slate-950 p-3 border-b border-slate-800 text-xs flex justify-between">
                <div>Kontext: <span id="active-context-title" class="text-teal-400 font-bold">Gesamte Wissensdatenbank</span></div>
            </div>
            <div id="chat-log" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm"></div>
            
            <div class="p-4 bg-slate-950 border-t border-slate-800 flex gap-2">
                <input id="chat-input" placeholder="Frage stellen..." 
                       class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal-500" disabled>
                <button id="send-btn" class="bg-teal-600 px-6 rounded-lg font-medium disabled:opacity-50" disabled>Senden</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';
        
        // PDF.js Setup
        const pdfjsLib = window.pdfjsLib || window['pdfjs-dist/build/pdf'];
        if (pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';
        }

        env.allowLocalModels = true;
        env.remoteModels = false;

        let links = [];
        let activeContextIndex = null;
        let generatorPipeline = null;

        // Event Listeners
        document.getElementById('btn-add').addEventListener('click', addLink);
        document.getElementById('pdf-upload').addEventListener('change', handlePDFUpload);
        document.getElementById('search-input').addEventListener('input', renderLinks);
        document.getElementById('send-btn').addEventListener('click', sendChatMessage);
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
        document.getElementById('model-selector').addEventListener('change', (e) => initLLM(e.target.value));

        loadLinksFromStorage();
        renderLinks();
        initLLM(document.getElementById('model-selector').value);

        async function initLLM(modelFolder) {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const log = document.getElementById('chat-log');

            chatInput.disabled = true;
            sendBtn.disabled = true;
            statusDot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
            statusText.textContent = "Lade Modell...";

            const manualBase = localStorage.getItem('manualModelBase') || '';
            const basePaths = manualBase ? [manualBase] : [
                window.location.origin + window.location.pathname.replace(/[^/]*$/, ''),
                `https://raw.githubusercontent.com/ergendoeper/myKnowledge-Hub/main/`
            ];

            for (let base of basePaths) {
                const tryPaths = [
                    `${base}${modelFolder}/`,
                    `${base}${modelFolder}/onnx/`
                ];

                for (let modelPath of tryPaths) {
                    addLog(`🔄 Teste: ${modelPath}`, 'amber');
                    try {
                        env.localModelPath = base;
                        generatorPipeline = await pipeline('text-generation', modelFolder, {
                            device: 'webgpu',
                            model_file: 'model_quantized.onnx',
                            quantized: true,
                            progress_callback: (data) => {
                                if (data.status === 'progress') statusText.textContent = `${Math.round(data.progress)}%`;
                            }
                        });

                        statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                        statusText.textContent = "✅ Bereit";
                        chatInput.disabled = false;
                        sendBtn.disabled = false;
                        addLog(`✅ Modell geladen von <code>${modelPath}</code>`, 'emerald');
                        return;
                    } catch (err) {
                        console.error(err);
                        addLog(`❌ ${err.message ? err.message.slice(0, 120) : err}`, 'red');
                    }
                }
            }

            statusDot.className = "w-2 h-2 rounded-full bg-red-500";
            statusText.textContent = "Fehler";
            addManualBaseUI();
        }

        function addLog(text, color = 'slate') {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.className = `p-3 rounded-xl text-sm ${color === 'emerald' ? 'bg-emerald-950 border border-emerald-700 text-emerald-300' : color === 'red' ? 'bg-red-950 border border-red-700 text-red-300' : 'bg-slate-800 text-slate-400'}`;
            div.innerHTML = text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function addManualBaseUI() {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.className = "bg-slate-800 p-4 rounded-xl border border-slate-600 mt-4";
            div.innerHTML = `
                <p class="text-xs text-slate-400 mb-2">Manuelle Model-Base-URL (z.B. http://localhost:8000/):</p>
                <input id="manual-base" placeholder="https://..." class="w-full bg-slate-900 border border-slate-600 px-3 py-2 rounded text-sm mb-3">
                <button onclick="saveManualBase()" class="w-full bg-teal-600 hover:bg-teal-700 py-2 rounded text-sm">Speichern &amp; Neu laden</button>
            `;
            log.appendChild(div);
        }

        window.saveManualBase = function() {
            const val = document.getElementById('manual-base').value.trim();
            if (val) {
                localStorage.setItem('manualModelBase', val);
                location.reload();
            }
        };

        // === PDF Upload ===
        async function handlePDFUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const title = file.name;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                const pdf = await loadingTask.promise;
                let fullText = '';

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    fullText += textContent.items.map(item => item.str).join(' ') + '\n\n';
                }

                links.unshift({ title, url: file.name, content: fullText.trim() });
                localStorage.setItem('local_knowledge_hub_links', JSON.stringify(links));
                renderLinks();
                addLog(`✅ PDF "${title}" erfolgreich extrahiert`, 'emerald');
            } catch (err) {
                console.error(err);
                addLog(`❌ PDF-Fehler: ${err.message}`, 'red');
            }
        }

        // === Knowledge Base ===
        function loadLinksFromStorage() {
            const stored = localStorage.getItem('local_knowledge_hub_links');
            if (stored) links = JSON.parse(stored);
        }

        function addLink() {
            const t = document.getElementById('link-title').value.trim();
            const u = document.getElementById('link-url').value.trim();
            const c = document.getElementById('link-content').value.trim();
            if (!t) return;

            links.unshift({ title: t, url: u || 'manuell', content: c });
            localStorage.setItem('local_knowledge_hub_links', JSON.stringify(links));
            renderLinks();
            document.getElementById('link-title').value = '';
            document.getElementById('link-url').value = '';
            document.getElementById('link-content').value = '';
        }

        function renderLinks() {
            const container = document.getElementById('links-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';

            const filtered = links.filter(l => 
                l.title.toLowerCase().includes(search) || 
                (l.content && l.content.toLowerCase().includes(search))
            );

            filtered.forEach((link, idx) => {
                const globalIdx = links.indexOf(link);
                const card = document.createElement('div');
                card.className = `p-3 rounded-lg border cursor-pointer transition-all ${globalIdx === activeContextIndex ? 'bg-teal-50 border-teal-500' : 'bg-white hover:bg-slate-50 border-slate-200'}`;
                card.innerHTML = `
                    <h4 class="font-medium text-sm truncate">${link.title}</h4>
                    <p class="text-xs text-slate-500 truncate">${link.url}</p>
                `;
                card.onclick = () => {
                    activeContextIndex = globalIdx;
                    document.getElementById('active-context-title').textContent = link.title;
                    renderLinks();
                };
                container.appendChild(card);
            });
        }

        async function sendChatMessage() {
            const inp = document.getElementById('chat-input');
            const log = document.getElementById('chat-log');
            const val = inp.value.trim();
            if (!val || !generatorPipeline) return;

            inp.value = '';
            const userDiv = document.createElement('div');
            userDiv.className = "bg-slate-700 p-3 rounded-xl max-w-[85%] ml-auto text-white";
            userDiv.textContent = val;
            log.appendChild(userDiv);

            const aiDiv = document.createElement('div');
            aiDiv.className = "bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-300 italic";
            aiDiv.textContent = "Denke nach...";
            log.appendChild(aiDiv);
            log.scrollTop = log.scrollHeight;

            const ctx = activeContextIndex !== null 
                ? links[activeContextIndex].content 
                : links.map(l => l.content).join("\n\n");

            try {
                const messages = [
                    { role: 'system', content: `Du bist ein hilfreicher IT-Assistent. Antworte präzise und kurz auf Deutsch. Verwende den folgenden Kontext:\n\n${ctx || "Kein Kontext verfügbar."}` },
                    { role: 'user', content: val }
                ];

                const output = await generatorPipeline(messages, {
                    max_new_tokens: 150,
                    temperature: 0.1,
                    repetition_penalty: 1.1
                });

                const answer = output[0].generated_text.at(-1).content.trim();
                aiDiv.className = "bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-100";
                aiDiv.textContent = answer || "Keine Antwort generiert.";
            } catch (err) {
                console.error(err);
                aiDiv.textContent = "Fehler bei der Generierung.";
            }
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>

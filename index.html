<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebGPU Knowledge Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">
    <header class="bg-slate-900 text-white px-6 py-4 shadow-md flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-teal-500 p-2 rounded-lg text-slate-950 font-bold text-xl">Ω</div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Local WebGPU Knowledge Hub</h1>
                <p class="text-xs text-slate-400">v2.3 • URL + HTML Support</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <select id="model-selector" class="bg-slate-800 text-slate-200 border border-slate-700 rounded px-3 py-1 text-sm">
                <option value="onnx-community/Qwen2.5-0.5B-Instruct">Qwen2.5-0.5B (empfohlen)</option>
                <option value="Xenova/Qwen1.5-0.5B-Chat">Qwen1.5-0.5B</option>
                <option value="onnx-community/SmolLM2-135M-Instruct">SmolLM2-135M</option>
            </select>
            <div id="model-status" class="flex items-center space-x-2 bg-slate-800 px-4 py-2 rounded border border-slate-700">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500"></span>
                <span id="status-text" class="text-xs text-slate-300">Bereit</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- Linke Spalte -->
        <div class="w-5/12 border-r border-slate-200 bg-white flex flex-col p-4 space-y-4 overflow-y-auto">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <h2 class="text-sm font-semibold uppercase tracking-wider mb-3">📄 Dokument / URL erfassen</h2>
                <div class="space-y-3">
                    <input type="text" id="link-title" placeholder="Titel" class="w-full px-3 py-2 border rounded-md text-sm">
                    
                    <!-- Neues URL-Feld -->
                    <input type="text" id="link-url" placeholder="https://beispiel.de/seite" 
                           class="w-full px-3 py-2 border rounded-md text-sm">
                    
                    <textarea id="link-content" rows="4" placeholder="Oder Text manuell einfügen..." 
                              class="w-full px-3 py-2 border rounded-md font-mono text-sm"></textarea>
                    
                    <div class="flex gap-2">
                        <button id="btn-add" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white py-2.5 rounded-md font-medium">Speichern</button>
                        <button id="btn-fetch-url" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-md font-medium">🌐 URL laden</button>
                        <label class="flex-1 bg-slate-200 hover:bg-slate-300 py-2.5 rounded-md text-center cursor-pointer font-medium">
                            📤 PDF hochladen
                            <input type="file" id="pdf-upload" accept=".pdf" class="hidden">
                        </label>
                    </div>
                </div>
            </div>

            <input type="text" id="search-input" placeholder="Durchsuchen..." class="w-full px-3 py-2 border rounded-lg bg-slate-50">
            <div id="links-container" class="flex-1 overflow-y-auto space-y-2"></div>
        </div>

        <!-- Chat -->
        <div class="w-7/12 flex flex-col bg-slate-900 text-slate-100 overflow-hidden">
            <div class="bg-slate-950 p-3 border-b border-slate-800 text-xs">
                Kontext: <span id="active-context-title" class="text-teal-400 font-bold">Gesamte Wissensdatenbank</span>
            </div>
            <div id="chat-log" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm"></div>
            
            <div class="p-4 bg-slate-950 border-t border-slate-800 flex gap-2">
                <input id="chat-input" placeholder="Stelle eine Frage..." 
                       class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal-500" disabled>
                <button id="send-btn" class="bg-teal-600 px-6 rounded-lg font-medium" disabled>Senden</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

        window.pdfjsLib = window.pdfjsLib || window['pdfjs-dist/build/pdf'];
        if (window.pdfjsLib) window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';

        env.allowLocalModels = false;
        env.remoteModels = true;

        let links = [], activeContextIndex = null, generatorPipeline = null;

        // Event Listeners
        document.getElementById('btn-add').addEventListener('click', addLink);
        document.getElementById('btn-fetch-url').addEventListener('click', fetchAndExtractURL);
        document.getElementById('pdf-upload').addEventListener('change', handlePDFUpload);
        document.getElementById('search-input').addEventListener('input', renderLinks);
        document.getElementById('send-btn').addEventListener('click', sendChatMessage);
        document.getElementById('chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });
        document.getElementById('model-selector').addEventListener('change', e => initLLM(e.target.value));

        loadLinksFromStorage();
        renderLinks();
        initLLM(document.getElementById('model-selector').value);

        // ==================== URL FETCH & TEXT EXTRACTION ====================
        async function fetchAndExtractURL() {
            const urlInput = document.getElementById('link-url');
            const url = urlInput.value.trim();
            if (!url) return alert("Bitte eine URL eingeben");

            const btn = document.getElementById('btn-fetch-url');
            const originalText = btn.textContent;
            btn.textContent = "Lade...";
            btn.disabled = true;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Seite nicht erreichbar");
                
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Entferne unerwünschte Elemente
                doc.querySelectorAll('script, style, nav, header, footer, aside, .ad, .cookie').forEach(el => el.remove());

                // Text extrahieren
                let text = doc.body.innerText || doc.body.textContent || "";
                text = text.replace(/\s+/g, ' ').trim();

                const title = doc.title || url.split('/').pop() || "Unbenannte Seite";

                document.getElementById('link-title').value = title;
                document.getElementById('link-content').value = text.substring(0, 15000); // Begrenzung

                addLog(`✅ Seite geladen: ${title} (${Math.round(text.length/100)/10} KB Text)`, 'emerald');
            } catch (err) {
                console.error(err);
                addLog(`❌ Fehler beim Laden: ${err.message}`, 'red');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // Die restlichen Funktionen (initLLM, handlePDFUpload, addLink, renderLinks, sendChatMessage, addLog) sind gleich wie in der vorherigen Version.
        // (Ich habe sie der Übersichtlichkeit halber hier nicht doppelt reingeschrieben – kopiere sie aus der vorherigen Nachricht oder sag Bescheid, falls du die volle Datei nochmal brauchst.)

        // ... [Hier die restlichen Funktionen aus der letzten vollständigen Version einfügen]
    </script>
</body>
</html>

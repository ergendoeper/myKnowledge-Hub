<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebGPU Knowledge Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">
    <!-- Header bleibt gleich -->
    <header class="bg-slate-900 text-white px-6 py-4 shadow-md flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="bg-teal-500 p-2 rounded-lg text-slate-950 font-bold text-xl">Ω</div>
            <div>
                <h1 class="text-xl font-bold">Local WebGPU Knowledge Hub</h1>
                <p class="text-xs text-slate-400">v2.0 • PDF-Support + Robust Loading</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <select id="model-selector" class="bg-slate-800 text-white rounded px-3 py-1 text-sm">
                <option value="model-qwen15">Qwen 1.5 (Ultra-Light)</option>
                <option value="model-smollm2">SmolLM2</option>
            </select>
            <div id="model-status" class="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded border border-slate-700">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="status-text" class="text-xs text-slate-300">Initialisiere...</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Linke Spalte -->
        <div class="w-5/12 border-r border-slate-200 bg-white flex flex-col p-4 space-y-4 overflow-y-auto">
            <div class="bg-slate-50 p-4 rounded-xl border">
                <h2 class="uppercase text-xs font-bold tracking-wider mb-3">📄 Dokument / Link erfassen</h2>
                <!-- Inputs wie vorher -->
                <input id="link-title" placeholder="Titel" class="w-full mb-2 px-3 py-2 border rounded">
                <input id="link-url" placeholder="URL (optional)" class="w-full mb-2 px-3 py-2 border rounded">
                <textarea id="link-content" rows="3" placeholder="Text oder PDF-Inhalt..." class="w-full mb-2 px-3 py-2 border rounded font-mono text-sm"></textarea>
                
                <div class="flex gap-2">
                    <button id="btn-add" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white py-2 rounded">Speichern</button>
                    <label class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 py-2 rounded text-center cursor-pointer">
                        📤 PDF hochladen
                        <input type="file" id="pdf-upload" accept=".pdf" class="hidden">
                    </label>
                </div>
            </div>

            <input id="search-input" placeholder="Suchen..." class="w-full px-3 py-2 border rounded">
            <div id="links-container" class="flex-1 overflow-y-auto space-y-2"></div>
        </div>

        <!-- Chat -->
        <div class="w-7/12 flex flex-col bg-slate-900 text-slate-100">
            <div class="p-3 border-b border-slate-700 text-xs bg-slate-950">
                Kontext: <span id="active-context-title" class="text-teal-400 font-medium">Gesamte Datenbank</span>
            </div>
            <div id="chat-log" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm"></div>
            
            <div class="p-4 border-t border-slate-700 bg-slate-950 flex gap-2">
                <input id="chat-input" placeholder="Frage stellen..." 
                       class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-sm" disabled>
                <button id="send-btn" class="bg-teal-600 px-6 rounded-lg font-medium" disabled>Senden</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';
        
        env.allowLocalModels = true;
        env.remoteModels = false;

        let links = [], activeContextIndex = null, generatorPipeline = null;

        // PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';

        // Event Listeners (wie vorher + PDF)
        document.getElementById('btn-add').addEventListener('click', addLink);
        document.getElementById('pdf-upload').addEventListener('change', handlePDFUpload);
        document.getElementById('search-input').addEventListener('input', renderLinks);
        document.getElementById('send-btn').addEventListener('click', sendChatMessage);
        document.getElementById('chat-input').addEventListener('keypress', e => e.key === 'Enter' && sendChatMessage());
        document.getElementById('model-selector').addEventListener('change', e => initLLM(e.target.value));

        loadLinksFromStorage();
        renderLinks();
        initLLM(document.getElementById('model-selector').value);

        async function initLLM(modelFolder) {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const log = document.getElementById('chat-log');

            statusDot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
            statusText.textContent = "Lade Modell...";

            const manualBase = localStorage.getItem('manualModelBase') || '';
            const basePaths = manualBase ? [manualBase] : [
                window.location.origin + window.location.pathname.replace(/[^/]*$/, ''),
                `https://raw.githubusercontent.com/ergendoeper/myKnowledge-Hub/main/`
            ];

            for (let base of basePaths) {
                const tryPaths = [
                    `${base}${modelFolder}/`,           // direkt
                    `${base}${modelFolder}/onnx/`       // mit onnx/ Unterordner
                ];

                for (let modelPath of tryPaths) {
                    addLog(`🔍 Teste: ${modelPath}`, 'amber');
                    try {
                        env.localModelPath = base;
                        generatorPipeline = await pipeline('text-generation', modelFolder, {
                            device: 'webgpu',
                            model_file: 'model_quantized.onnx',
                            quantized: true,
                            progress_callback: (p) => {
                                if (p.status === 'progress') statusText.textContent = `${Math.round(p.progress)}%`;
                            }
                        });

                        statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                        statusText.textContent = "✅ Bereit (WebGPU)";
                        document.getElementById('chat-input').disabled = false;
                        document.getElementById('send-btn').disabled = false;
                        addLog(`✅ Erfolgreich geladen: ${modelPath}`, 'emerald');
                        return;
                    } catch (e) {
                        console.error(e);
                        addLog(`❌ Fehlgeschlagen: ${e.message?.slice(0,100)}`, 'red');
                    }
                }
            }

            // Fallback
            statusDot.className = "w-2 h-2 rounded-full bg-red-500";
            statusText.textContent = "Fehler";
            addManualBaseUI();
        }

        function addLog(msg, color = 'slate') {
            const log = document.getElementById('chat-log');
            const el = document.createElement('div');
            el.className = `p-3 rounded-xl text-sm ${color === 'emerald' ? 'bg-emerald-900/50 border border-emerald-700' : color === 'red' ? 'bg-red-900/50 border border-red-700' : 'bg-slate-800'}`;
            el.innerHTML = msg;
            log.appendChild(el);
            log.scrollTop = log.scrollHeight;
        }

        function addManualBaseUI() {
            const div = document.createElement('div');
            div.className = "bg-slate-800 p-4 rounded-xl mt-4 border border-slate-600";
            div.innerHTML = `
                <p class="text-xs mb-2">Manuelle Base-URL (z.B. http://localhost:8000/):</p>
                <input id="manual-base-input" class="w-full bg-slate-900 border border-slate-600 px-3 py-2 rounded text-sm" placeholder="http://localhost:8000/">
                <button onclick="saveAndReload()" class="mt-3 w-full bg-teal-600 py-2 rounded text-sm">Speichern & Neu laden</button>
            `;
            document.getElementById('chat-log').appendChild(div);
        }

        window.saveAndReload = () => {
            const val = document.getElementById('manual-base-input').value.trim();
            if (val) localStorage.setItem('manualModelBase', val);
            location.reload();
        };

        // PDF Handling
        async function handlePDFUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const title = file.name;
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    fullText += textContent.items.map(item => item.str).join(' ') + '\n\n';
                }
                links.unshift({ title, url: file.name, content: fullText });
                localStorage.setItem('local_knowledge_hub_links', JSON.stringify(links));
                renderLinks();
                addLog(`📄 PDF "${title}" extrahiert (${fullText.length} Zeichen)`, 'emerald');
            };
            reader.readAsArrayBuffer(file);
        }

        // Restliche Funktionen (addLink, renderLinks, sendChatMessage) wie in vorheriger Version – ich kann sie bei Bedarf nochmal komplett schicken.

        // ... (die restlichen Funktionen aus der vorherigen robusten Version einfügen)
    </script>
</body>
</html>

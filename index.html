<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebGPU Knowledge Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">
    <header class="bg-slate-900 text-white px-6 py-4 shadow-md flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="bg-teal-500 p-2 rounded-lg text-slate-950 font-bold text-xl">Ω</div>
            <div>
                <h1 class="text-xl font-bold">Local WebGPU Knowledge Hub</h1>
                <p class="text-xs text-slate-400">v2.1 • Pure Browser Mode</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <select id="model-selector" class="bg-slate-800 text-white rounded px-3 py-1 text-sm">
                <option value="Qwen1.5-0.5B-Chat">Qwen 0.5B (HF ONNX)</option>
                <option value="SmolLM2-135M-Instruct">SmolLM2 (HF ONNX)</option>
            </select>
            <div id="model-status" class="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded border border-slate-700">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="status-text" class="text-xs">Initialisiere...</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- Linke Spalte (Dokumente + PDF) -->
        <div class="w-5/12 border-r bg-white flex flex-col p-4 space-y-4 overflow-y-auto">
            <div class="bg-slate-50 p-4 rounded-xl border">
                <h2 class="uppercase text-xs font-bold mb-3">📄 Dokument erfassen</h2>
                <input id="link-title" placeholder="Titel" class="w-full mb-2 px-3 py-2 border rounded">
                <textarea id="link-content" rows="4" placeholder="Text oder PDF-Inhalt..." class="w-full mb-3 px-3 py-2 border rounded font-mono text-sm"></textarea>
                <div class="flex gap-2">
                    <button id="btn-add" class="flex-1 bg-teal-600 text-white py-2 rounded">Speichern</button>
                    <label class="flex-1 bg-slate-200 hover:bg-slate-300 py-2 rounded text-center cursor-pointer">
                        📤 PDF hochladen
                        <input type="file" id="pdf-upload" accept=".pdf" class="hidden">
                    </label>
                </div>
            </div>
            <input id="search-input" placeholder="Suchen..." class="w-full px-3 py-2 border rounded">
            <div id="links-container" class="flex-1 overflow-y-auto space-y-2"></div>
        </div>

        <!-- Chat -->
        <div class="w-7/12 flex flex-col bg-slate-900 text-slate-100">
            <div class="p-3 border-b border-slate-700 bg-slate-950 text-xs">
                Kontext: <span id="active-context-title" class="text-teal-400">Gesamte Wissensdatenbank</span>
            </div>
            <div id="chat-log" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm"></div>
            <div class="p-4 border-t border-slate-700 bg-slate-950 flex gap-2">
                <input id="chat-input" placeholder="Frage stellen..." class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-sm" disabled>
                <button id="send-btn" class="bg-teal-600 px-6 rounded-lg font-medium" disabled>Senden</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';

        env.allowLocalModels = true;
        env.remoteModels = true;   // Wichtig für HF-Direktzugriff

        let links = [], activeContextIndex = null, generatorPipeline = null;

        // Event Listener
        document.getElementById('btn-add').addEventListener('click', addLink);
        document.getElementById('pdf-upload').addEventListener('change', handlePDFUpload);
        document.getElementById('search-input').addEventListener('input', renderLinks);
        document.getElementById('send-btn').addEventListener('click', sendChatMessage);
        document.getElementById('chat-input').addEventListener('keypress', e => e.key === 'Enter' && sendChatMessage());
        document.getElementById('model-selector').addEventListener('change', e => initLLM(e.target.value));

        loadLinksFromStorage();
        renderLinks();
        initLLM(document.getElementById('model-selector').value);

        async function initLLM(modelId) {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const log = document.getElementById('chat-log');

            statusDot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
            statusText.textContent = "Lade Modell von HF...";

            try {
                addLog(`🔄 Lade ${modelId} direkt von Hugging Face...`, 'amber');

                generatorPipeline = await pipeline('text-generation', modelId, {
                    device: 'webgpu',
                    quantized: true,
                    progress_callback: (data) => {
                        if (data.status === 'progress') statusText.textContent = `${Math.round(data.progress)}%`;
                    }
                });

                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                statusText.textContent = "✅ Bereit";
                document.getElementById('chat-input').disabled = false;
                document.getElementById('send-btn').disabled = false;
                addLog(`✅ ${modelId} erfolgreich geladen (HF ONNX)`, 'emerald');
            } catch (err) {
                console.error(err);
                addLog(`❌ HF-Ladefehler: ${err.message}`, 'red');
                addLog("Versuche GitHub-Fallback oder manuelle URL...", 'amber');
                // Hier könnte man später noch GitHub/jsDelivr versuchen
            }
        }

        function addLog(msg, color = 'slate') {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.className = `p-3 rounded-xl text-sm ${color === 'emerald' ? 'bg-emerald-950 border border-emerald-700 text-emerald-300' : color === 'red' ? 'bg-red-950 border border-red-700 text-red-300' : 'bg-slate-800'}`;
            div.innerHTML = msg;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        // PDF + Rest der Funktionen (addLink, renderLinks, sendChatMessage, loadLinksFromStorage, handlePDFUpload) bleiben gleich wie in der letzten vollständigen Version.

        // (Ich kann sie bei Bedarf nochmal kopieren, aber sie sind identisch zur vorherigen Nachricht)

        async function handlePDFUpload(e) { /* ... wie vorher */ }
        function loadLinksFromStorage() { /* ... */ }
        function addLink() { /* ... */ }
        function renderLinks() { /* ... */ }
        async function sendChatMessage() { /* ... */ }
    </script>
</body>
</html>
